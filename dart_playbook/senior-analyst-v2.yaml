# ---------------------------------------------------------------------------
# OPERATOR NOTES
# ---------------------------------------------------------------------------
operator_notes: |
  This playbook is intentionally opinionated. It encodes how a senior
  DFIR analyst would investigate, not how a junior analyst with a
  checklist would. Specifically:

  1. Phase order is strict. A senior analyst does NOT skip volatility
     to get to "the interesting stuff". Memory disappears.

  2. Hypotheses are falsifiable. "Something bad happened" is not a
     hypothesis. "T1003.001 LSASS dump via comsvcs.dll executed at
     14:23:09 UTC" is.

  3. Contradictions are gold. When two artifacts disagree, that's the
     most valuable signal in the case. Smoothing it over is malpractice.

  4. Recovery denial check is mandatory for any ransomware case.
     Modern attackers (M-Trends 2026) systematically destroy recovery.
     Endpoint encryption is the diversion, not the impact.

  5. Attribution is a multi-vector exercise. Single-IOC attribution
     is what gets analysts fired. Diamond Model with 4 corners or no
     attribution claim.

  6. Findings cite audit_ids. Always. The serializer will refuse to
     emit any finding without one — that's not a guideline, that's
     architecture.

  Forking this playbook for your case class:
    1. Copy this file to dart_playbook/<your-name>-v1.yaml
    2. Update target_case_classes
    3. Tune next_call_decisions for your priorities
    4. Add contradiction_triggers specific to your environment
    5. Run with --playbook <your-name>-v1.yaml

  The architectural guarantees (read-only, audit chain, contradiction
  enforcement) apply to every playbook. You cannot loosen them by
  forking.
